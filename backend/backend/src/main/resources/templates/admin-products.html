<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Products – Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="fw-bold mb-0">Products</h1>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-dark" href="/admin">Admin Home</a>
            <a class="btn btn-dark" href="/admin/products/new">New Product</a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>Name</th>
                <th>Slug</th>
                <th class="text-end">Price</th>
                <th class="text-end">Active</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.name}">Name</td>
                <td th:text="${p.slug}">slug</td>
                <td class="text-end" th:text="${p.priceFormatted}">£0.00</td>
                <td class="text-end" th:text="${p.active}">true</td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-dark" th:href="@{'/admin/products/' + ${p.id} + '/edit'}">Edit</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
