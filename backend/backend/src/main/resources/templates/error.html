<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Something went wrong – Pink Archive</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/pa.css">
</head>
<body>

<nav class="navbar pa-nav sticky-top">
    <div class="container py-2">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
            <img src="/img/logo.jpg" alt="Pink Archive" style="height:34px; width:auto;">
            <span class="d-none d-sm-inline">Pink Archive</span>
        </a>
        <div class="d-flex gap-2">
            <a class="btn btn-sm btn-light" href="/shop">Shop</a>
            <a class="btn btn-sm btn-light" href="/cart">Cart</a>
        </div>
    </div>
</nav>

<main class="container my-5" style="max-width: 860px;">
    <div class="pa-panel p-4 p-md-5 shadow-sm">
        <div class="d-flex align-items-start justify-content-between flex-wrap gap-3">
            <div>
                <div class="small text-uppercase pa-muted">Pink Archive</div>
                <h1 class="fw-bold pa-title mb-2">We hit a snag</h1>
                <p class="mb-0 pa-muted">
                    Something went wrong on our side. Please try again in a moment.
                </p>
            </div>

            <span class="badge rounded-pill text-bg-warning align-self-start">
        Error <span th:text="${status}">500</span>
      </span>
        </div>

        <div class="pa-ribbon my-4"></div>

        <div class="d-flex gap-2 flex-wrap">
            <a class="btn btn-dark" href="/shop">Back to shop</a>
            <a class="btn btn-outline-dark" href="/">Home</a>
        </div>

        <!-- Debug info hidden by default -->
        <details class="mt-4">
            <summary class="small">Technical details</summary>
            <div class="small pa-muted mt-2">
                <div><b>Path:</b> <span th:text="${path}">/</span></div>
                <div><b>Timestamp:</b> <span th:text="${timestamp}"></span></div>
                <div><b>Message:</b> <span th:text="${error}"></span></div>
            </div>
        </details>
    </div>
</main>

</body>
</html>
