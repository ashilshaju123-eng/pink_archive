<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Pink Archive</title>

    <!-- Bootstrap (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/pa.css">
</head>
<body>
<nav class="navbar pa-nav sticky-top">
    <div class="container py-2">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
            <img src="/img/logo.jpg" alt="Pink Archive" style="height:34px; width:auto;">
            <span class="d-none d-sm-inline">Pink Archive</span>
        </a>

        <div class="d-flex gap-2">
            <a class="btn btn-sm btn-light" href="/">Home</a>
            <a class="btn btn-sm btn-light" href="/shop">Shop</a>
            <a class="btn btn-sm btn-light" href="/cart">Cart</a>
        </div>
    </div>
</nav>

<main class="container my-5">

    <div class="pa-panel p-5 position-relative overflow-hidden">

        <div class="row align-items-center g-4">

            <div class="col-md-6">

                <div class="small text-uppercase pa-muted mb-2">Pink Archive Collection</div>

                <h1 class="display-4 fw-bold pa-title mb-4">
                    Elevated Matching Sets
                </h1>

                <p class="lead pa-muted mb-4">
                    Designed for soft silhouettes, statement comfort, and effortless styling.
                    UK shipping. Limited drops.
                </p>

                <div class="d-flex gap-3">
                    <a class="btn pa-btn btn-lg px-4" href="/shop">Shop Collection</a>
                </div>

            </div>

            <div class="col-md-6 text-center">

                <div class="position-relative">
                    <img src="/img/logo.jpg"
                         class="img-fluid pa-img shadow-sm"
                         style="max-height:420px; object-fit:cover;"
                         alt="Pink Archive">
                </div>

            </div>

        </div>

        <div class="pa-ribbon mt-5"></div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
