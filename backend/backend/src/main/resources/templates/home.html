<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Pink Archive</title>

    <!-- Bootstrap (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --pa-bg: #f6c4d9;
            --pa-card: #f8d0e2;
            --pa-accent: #e577a8;
            --pa-text: #2b1b1f;
        }

        body { background: var(--pa-bg); color: var(--pa-text); }
        .pa-nav { background: rgba(255,255,255,0.25); backdrop-filter: blur(6px); }
        .pa-hero { background: rgba(255,255,255,0.35); border-radius: 24px; }
        .pa-btn { background: var(--pa-accent); border: none; }
        .pa-btn:hover { filter: brightness(0.95); }
    </style>
</head>
<body>
<nav class="navbar pa-nav sticky-top">
    <div class="container py-2">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
            <img src="/img/logo.jpg" alt="Pink Archive" style="height:34px; width:auto;">
            <span class="d-none d-sm-inline">Pink Archive</span>
        </a>

        <div class="d-flex gap-2">
            <a class="btn btn-sm btn-light" href="/">Home</a>
            <a class="btn btn-sm btn-light" href="/shop">Shop</a>
        </div>
    </div>
</nav>

<main class="container my-5">
    <div class="pa-hero p-4 p-md-5 shadow-sm">
        <div class="row align-items-center g-4">
            <div class="col-md-7">
                <h1 class="display-5 fw-bold mb-3">Soft. Pink. Iconic.</h1>
                <p class="lead mb-4">
                    Matching sets built for the Pink Archive aesthetic. UK shipping. Sizes S / M / L.
                </p>
                <a class="btn btn-lg text-white pa-btn" href="/shop">Shop →</a>
            </div>

            <div class="col-md-5 text-center">
                <img src="/img/logo.jpg" class="img-fluid rounded-4 shadow-sm" alt="Pink Archive logo">
            </div>
        </div>
    </div>

    <div class="mt-4 text-center small opacity-75">
        Tip: Stuff to add later. like payments
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
