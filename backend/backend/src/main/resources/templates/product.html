<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${product.name} + ' – Pink Archive'">Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --pa-bg: #f6c4d9;
            --pa-card: rgba(255,255,255,0.55);
            --pa-accent: #e577a8;
            --pa-text: #2b1b1f;
        }
        body { background: var(--pa-bg); color: var(--pa-text); }
        .pa-nav { background: rgba(255,255,255,0.25); backdrop-filter: blur(6px); }
        .pa-panel { background: var(--pa-card); border-radius: 22px; }
        .pa-btn { background: var(--pa-accent); border: none; }
        .pa-btn:hover { filter: brightness(0.95); }
        .size-btn.active { outline: 2px solid rgba(0,0,0,0.25); }
    </style>
</head>
<body>

<nav class="navbar pa-nav sticky-top">
    <div class="container py-2">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
            <img src="/img/logo.jpg" alt="Pink Archive" style="height:34px; width:auto;">
            <span class="d-none d-sm-inline">Pink Archive</span>
        </a>

        <div class="d-flex gap-2">
            <a class="btn btn-sm btn-light" href="/">Home</a>
            <a class="btn btn-sm btn-light" href="/shop">Shop</a>
        </div>
    </div>
</nav>

<main class="container my-5">
    <a href="/shop" class="text-decoration-none">← Back to shop</a>

    <div class="row g-4 mt-2">
        <div class="col-md-6">
            <img th:src="${product.imageUrl}" class="img-fluid rounded-4 shadow-sm"
                 alt="product image" style="aspect-ratio:3/4; object-fit:cover; background:#fff;">
        </div>

        <div class="col-md-6">
            <div class="pa-panel p-4 shadow-sm">
                <h1 class="fw-bold mb-2" th:text="${product.name}">Product Name</h1>
                <div class="fs-4 fw-semibold mb-3" th:text="${product.priceFormatted}">£00.00</div>

                <div class="mb-2 fw-semibold">Size</div>
                <div class="d-flex gap-2 flex-wrap mb-3">
                    <button type="button" class="btn btn-light size-btn" th:each="s : ${sizes}"
                            th:text="${s}" th:attr="data-size=${s}"
                            onclick="selectSize(this)">
                        S
                    </button>
                </div>

                <div class="small opacity-75 mb-3">
                    UK shipping • Matching set • Sizes S / M / L
                </div>

                <button id="addBtn" class="btn text-white pa-btn w-100" disabled>
                    Select a size to add to cart (next step)
                </button>
            </div>
        </div>
    </div>
</main>

<script>
    function selectSize(btn) {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const size = btn.getAttribute('data-size');
        const addBtn = document.getElementById('addBtn');
        addBtn.disabled = false;
        addBtn.textContent = `Add to cart (Size: ${size}) (cart next step)`;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
