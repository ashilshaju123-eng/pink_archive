<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Shop – Pink Archive</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --pa-bg: #f6c4d9;
            --pa-card: rgba(255,255,255,0.55);
            --pa-accent: #e577a8;
            --pa-text: #2b1b1f;
        }
        body { background: var(--pa-bg); color: var(--pa-text); }
        .pa-nav { background: rgba(255,255,255,0.25); backdrop-filter: blur(6px); }
        .pa-card { background: var(--pa-card); border: 0; border-radius: 18px; }
        .pa-btn { background: var(--pa-accent); border: none; }
        .pa-btn:hover { filter: brightness(0.95); }
    </style>
</head>
<body>

<nav class="navbar pa-nav sticky-top">
    <div class="container py-2">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
            <img src="/img/logo.jpg" alt="Pink Archive" style="height:34px; width:auto;">
            <span class="d-none d-sm-inline">Pink Archive</span>
        </a>

        <div class="d-flex gap-2">
            <a class="btn btn-sm btn-light" href="/">Home</a>
            <a class="btn btn-sm btn-light" href="/shop">Shop</a>
        </div>
    </div>
</nav>

<main class="container my-5">
    <div class="d-flex align-items-end justify-content-between gap-3 mb-3">
        <div>
            <h1 class="fw-bold mb-1">Shop</h1>
            <div class="opacity-75">Matching sets • UK shipping • Sizes S / M / L</div>
        </div>

        <!-- placeholder for later search/filter -->
        <div class="d-none d-md-block opacity-75 small">Filters coming later</div>
    </div>

    <div class="row g-3">
        <div class="col-6 col-md-4 col-lg-3" th:each="p : ${products}">
            <div class="card pa-card shadow-sm h-100">
                <img th:src="${p.imageUrl}" class="card-img-top" alt="product image" style="aspect-ratio:3/4; object-fit:cover; border-top-left-radius:18px; border-top-right-radius:18px;">
                <div class="card-body d-flex flex-column">
                    <div class="fw-semibold" th:text="${p.name}">Product name</div>
                    <div class="mt-1 mb-3" th:text="${p.priceFormatted}">£00.00</div>

                    <a class="btn text-white pa-btn mt-auto"
                       th:href="@{'/product/' + ${p.slug}}">
                        View
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
