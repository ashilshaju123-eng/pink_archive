spring.application.name=backend


server.servlet.session.cookie.http-only=true


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/pink_archive?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

pinkarchive.admin.username=${ADMIN_USERNAME}
pinkarchive.admin.password=${ADMIN_PASSWORD}

stripe.secretKey=${STRIPE_SECRET_KEY}
stripe.webhookSecret=${STRIPE_WEBHOOK_SECRET}
stripe.successUrl=http://localhost:8080/checkout/success
stripe.cancelUrl=http://localhost:8080/cart


spring.web.error.whitelabel.enabled=false
spring.web.error.include-binding-errors=never
spring.web.error.include-exception=false