<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Order – Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/pa.css">
</head>

<body class="p-4">
<div class="container" style="max-width: 980px;">

    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
        <div>
            <h1 class="fw-bold mb-1">Order <span th:text="${order.id}">0</span></h1>
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <span class="badge rounded-pill"
                      th:classappend="${order.status} == 'PAID' ? ' text-bg-success' : ' text-bg-warning'"
                      th:text="${order.status}">CREATED</span>
                <span class="small opacity-75">
                    Created: <span th:text="${order.createdAt}">time</span>
                </span>
                <span class="small opacity-75" th:if="${order.paidAt != null}">
                    • Paid: <span th:text="${order.paidAt}">time</span>
                </span>
            </div>
        </div>

        <div class="text-end">
            <div class="small opacity-75">Total</div>
            <div class="fs-3 fw-semibold" th:text="${order.totalFormatted}">£0.00</div>
            <div class="small opacity-75">
                Session: <span th:text="${order.stripeSessionId}">cs_test_...</span>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2 mb-3">
        <a class="btn btn-outline-dark" href="/admin/orders">← Back to Orders</a>
        <a class="btn btn-outline-dark" href="/admin">Admin Home</a>
        <a class="btn btn-outline-dark" href="/shop">View Store</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>Product</th>
                <th class="text-center">Size</th>
                <th class="text-center">Qty</th>
                <th class="text-end">Unit</th>
                <th class="text-end">Line</th>
            </tr>
            </thead>
            <tbody>

            <tr th:if="${#lists.isEmpty(items)}">
                <td colspan="5" class="text-center py-4 opacity-75">
                    No items found for this order.
                </td>
            </tr>

            <tr th:each="it : ${items}">
                <td>
                    <div class="fw-semibold" th:text="${it.productName}">Product</div>
                    <div class="small opacity-75" th:text="${it.productSlug}">slug</div>
                </td>
                <td class="text-center" th:text="${it.size}">S</td>
                <td class="text-center" th:text="${it.quantity}">1</td>
                <td class="text-end" th:text="${it.unitPriceFormatted}">£0.00</td>
                <td class="text-end fw-semibold" th:text="${it.lineTotalFormatted}">£0.00</td>
            </tr>

            </tbody>
        </table>
    </div>

</div>
</body>
</html>
