<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Orders – Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/pa.css">
</head>

<body class="p-4">
<div class="container">

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <div>
            <h1 class="fw-bold mb-0">Orders</h1>
            <div class="opacity-75 small">Latest orders (newest first).</div>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-dark" href="/admin">Admin Home</a>
            <a class="btn btn-dark" href="/admin/orders.csv">Export CSV</a>
            <a class="btn btn-outline-dark" href="/shop">View Store</a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Status</th>
                <th>Total</th>
                <th>Created</th>
                <th>Paid</th>
                <th class="text-end">Session</th>
                <th class="text-end"></th>
            </tr>
            </thead>
            <tbody>

            <tr th:if="${#lists.isEmpty(orders)}">
                <td colspan="7" class="text-center py-4 opacity-75">
                    No orders yet.
                </td>
            </tr>

            <tr th:each="o : ${orders}">
                <td class="fw-semibold" th:text="${o.id}">1</td>

                <td>
                    <span class="badge rounded-pill"
                          th:classappend="${o.status} == 'PAID' ? ' text-bg-success' : ' text-bg-warning'"
                          th:text="${o.status}">
                        PAID
                    </span>
                </td>

                <td class="fw-semibold" th:text="${o.totalFormatted}">£0.00</td>

                <td class="small opacity-75" th:text="${o.createdAt}">created</td>
                <td class="small opacity-75" th:text="${o.paidAt}">paid</td>

                <td class="text-end small opacity-75">
                    <span th:text="${o.stripeSessionId}">cs_test_...</span>
                </td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-dark" th:href="@{'/admin/orders/' + ${o.id}}">View</a>
                </td>
            </tr>

            </tbody>
        </table>
    </div>

</div>
</body>
</html>
