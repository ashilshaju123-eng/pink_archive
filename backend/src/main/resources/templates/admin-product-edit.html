<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Edit Product – Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
<div class="container" style="max-width: 720px;">
    <h1 class="fw-bold">Edit Product</h1>

    <form method="post" th:action="@{'/admin/products/' + ${productId} + '/edit'}" th:object="${form}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input class="form-control" type="text" th:field="*{name}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Slug (unique)</label>
            <input class="form-control" type="text" th:field="*{slug}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Image URL</label>
            <input class="form-control" type="url" th:field="*{imageUrl}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Price (pence)</label>
            <input class="form-control" type="number" min="1" th:field="*{pricePence}" required>
        </div>

        <div class="row g-2 mb-3">
            <div class="col">
                <label class="form-label">Stock S</label>
                <input class="form-control" type="number" min="0" th:field="*{stockS}" required>
            </div>
            <div class="col">
                <label class="form-label">Stock M</label>
                <input class="form-control" type="number" min="0" th:field="*{stockM}" required>
            </div>
            <div class="col">
                <label class="form-label">Stock L</label>
                <input class="form-control" type="number" min="0" th:field="*{stockL}" required>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-dark" type="submit">Save</button>
            <a class="btn btn-outline-dark" href="/admin/products">Back</a>
        </div>
    </form>

    <div class="mt-4">
        <div class="small opacity-75">Product ID: <span th:text="${productId}"></span></div>
    </div>
</div>
</body>
</html>
