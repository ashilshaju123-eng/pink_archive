<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>New Product – Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
<div class="container" style="max-width: 720px;">
    <h1 class="fw-bold">New Product</h1>
    <p class="opacity-75">Creates product + variants (S/M/L).</p>

    <form method="post" th:action="@{/admin/products/new}" th:object="${form}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input class="form-control" type="text" th:field="*{name}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Slug (unique)</label>
            <input class="form-control" type="text" th:field="*{slug}" placeholder="e.g. blush-matching-set" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Image URL</label>
            <input class="form-control" type="url" th:field="*{imageUrl}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Price (pence)</label>
            <input class="form-control" type="number" min="1" th:field="*{pricePence}" placeholder="e.g. 2999" required>
            <div class="form-text">We store money as integer pence (avoids float bugs).</div>
        </div>

        <div class="row g-2 mb-3">
            <div class="col">
                <label class="form-label">Stock S</label>
                <input class="form-control" type="number" min="0" th:field="*{stockS}" required>
            </div>
            <div class="col">
                <label class="form-label">Stock M</label>
                <input class="form-control" type="number" min="0" th:field="*{stockM}" required>
            </div>
            <div class="col">
                <label class="form-label">Stock L</label>
                <input class="form-control" type="number" min="0" th:field="*{stockL}" required>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-dark" type="submit">Create</button>
            <a class="btn btn-outline-dark" href="/admin/products">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
