<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Cart – Pink Archive</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --pa-bg: #f6c4d9;
            --pa-card: rgba(255,255,255,0.55);
            --pa-accent: #e577a8;
            --pa-text: #2b1b1f;
        }
        body { background: var(--pa-bg); color: var(--pa-text); }
        .pa-nav { background: rgba(255,255,255,0.25); backdrop-filter: blur(6px); }
        .pa-panel { background: var(--pa-card); border-radius: 22px; }
        .pa-btn { background: var(--pa-accent); border: none; }
        .pa-btn:hover { filter: brightness(0.95); }
    </style>
    <link rel="stylesheet" href="/css/pa.css">
</head>
<body>

<nav class="navbar pa-nav sticky-top">
    <div class="container py-2">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
            <img src="/img/logo.jpg" alt="Pink Archive" style="height:34px; width:auto;">
            <span class="d-none d-sm-inline">Pink Archive</span>
        </a>

        <div class="d-flex gap-2">
            <a class="btn btn-sm btn-light" href="/shop">Shop</a>
            <a class="btn btn-sm btn-light" href="/cart">Cart</a>
        </div>
    </div>
</nav>

<main class="container my-5">
    <h1 class="fw-bold mb-3">Cart</h1>

    <div class="pa-panel p-4 shadow-sm">
        <div th:if="${cart.empty}">
            <p class="mb-0">Your cart is empty.</p>
            <a class="btn btn-light mt-3" href="/shop">Go to shop</a>
        </div>

        <div th:if="${!cart.empty}">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Item</th>
                        <th>Size</th>
                        <th class="text-end">Unit</th>
                        <th class="text-end">Qty</th>
                        <th class="text-end">Total</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="i : ${cart.items}">
                        <td th:text="${i.productName}">Product</td>
                        <td th:text="${i.size}">S</td>
                        <td class="text-end" th:text="${i.unitPriceFormatted}">£0.00</td>
                        <td class="text-end" th:text="${i.quantity}">1</td>
                        <td class="text-end fw-semibold" th:text="${i.lineTotalFormatted}">£0.00</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-3">
                <div class="fw-semibold fs-5">Total: <span th:text="${cart.totalFormatted}">£0.00</span></div>

                <div class="d-flex gap-2">
                    <form method="post" action="/cart/clear">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-light" type="submit">Clear cart</button>
                    </form>
                    <form method="post" action="/checkout" class="m-0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn text-white pa-btn" type="submit">Checkout</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
