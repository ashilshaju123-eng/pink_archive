<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${product.name} + ' – Pink Archive'">Product</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/pa.css">
</head>

<body>

<nav class="navbar pa-nav sticky-top">
    <div class="container py-2">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
            <img src="/img/logo.jpg" alt="Pink Archive" style="height:34px;">
            <span class="d-none d-sm-inline">Pink Archive</span>
        </a>

        <div class="d-flex gap-2">
            <a class="btn btn-sm btn-light" href="/shop">Shop</a>
            <a class="btn btn-sm btn-light" href="/cart">Cart</a>
        </div>
    </div>
</nav>

<main class="container my-5">

    <a href="/shop" class="text-decoration-none">← Back to shop</a>

    <div class="row g-4 mt-2">

        <!-- Product Image -->
        <div class="col-md-6">
            <img th:src="${product.imageUrl}"
                 class="img-fluid rounded-4 shadow-sm"
                 alt="product image"
                 style="aspect-ratio:3/4; object-fit:cover; background:#fff;">
        </div>

        <!-- Product Info -->
        <div class="col-md-6">
            <div class="pa-panel p-5">

                <h1 class="fw-bold mb-2 pa-title"
                    th:text="${product.name}">
                    Product Name
                </h1>

                <div class="fs-3 fw-semibold mb-3"
                     th:text="${product.priceFormatted}">
                    £00.00
                </div>

                <!-- Size Selector -->
                <div class="mb-2 fw-semibold">Size</div>

                <div class="d-flex gap-2 flex-wrap mb-3">
                    <button type="button"
                            class="btn btn-light size-btn"
                            th:each="v : ${variants}"
                            th:text="${v.size}"
                            th:attr="data-size=${v.size}, data-instock=${v.inStock}"
                            th:disabled="${!v.inStock}"
                            onclick="selectSize(this)">
                        S
                    </button>
                </div>

                <div class="small opacity-75 mb-3">
                    <span th:text="'UK shipping • Matching set • Stock updates live'"></span>
                </div>


                <div class="small opacity-75 mb-3">
                    UK shipping • Matching set • Sizes S / M / L
                </div>

                <!-- Add to Cart Form -->
                <form method="post" action="/cart/add">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="slug" th:value="${product.slug}">
                    <input type="hidden" id="sizeInput" name="size" value="">

                    <button id="addBtn"
                            class="btn text-white pa-btn w-100"
                            disabled>
                        Select a size to add to cart
                    </button>
                </form>

            </div>
        </div>

    </div>
</main>

<script>
    function selectSize(btn) {
        if (btn.disabled) return;

        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const size = btn.getAttribute('data-size');
        document.getElementById('sizeInput').value = size;

        const addBtn = document.getElementById('addBtn');
        addBtn.disabled = false;
        addBtn.textContent = "Add to cart (Size: " + size + ")";
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
