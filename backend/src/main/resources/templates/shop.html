<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Shop – Pink Archive</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/pa.css">
</head>
<body>

<nav class="navbar pa-nav sticky-top">
    <div class="container py-2">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
            <img src="/img/logo.jpg" alt="Pink Archive" style="height:34px; width:auto;">
            <span class="d-none d-sm-inline">Pink Archive</span>
        </a>

        <div class="d-flex gap-2">
            <a class="btn btn-sm btn-light" href="/">Home</a>
            <a class="btn btn-sm btn-light" href="/shop">Shop</a>
            <a class="btn btn-sm btn-light" href="/cart">Cart</a>
        </div>
    </div>
</nav>

<main class="container my-5">
    <div class="d-flex align-items-end justify-content-between gap-3 mb-3">
        <div>
            <div class="small text-uppercase pa-muted">Collection</div>
            <h1 class="fw-bold mb-2 pa-title">Pink Archive Sets</h1>
            <div class="pa-muted">Designed for everyday statement dressing</div>
            <div class="pa-ribbon mt-3 mb-4"></div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-6 col-md-4 col-lg-3" th:each="p : ${products}">
            <div class="card pa-card h-100 p-3">
                <img th:src="${p.imageUrl}"
                     class="w-100"
                     style="aspect-ratio:3/4; object-fit:cover; border-radius:6px;">

                <div class="d-flex flex-column pt-3">
                    <div class="fw-semibold" th:text="${p.name}">Product name</div>
                    <div class="mt-1 mb-3" th:text="${p.priceFormatted}">£00.00</div>

                    <a class="btn text-white pa-btn mt-auto"
                       th:href="@{'/product/' + ${p.slug}}">
                        View
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
